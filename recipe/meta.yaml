{% set version = "1.26.0" %}

package:
  name: openmeteo-sdk
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/o/openmeteo-sdk/openmeteo_sdk-{{ version }}.tar.gz
  sha256: 209dff3fa3a3a1b7363b223db5770ac683fa76540518b8d5bba77d551a5227c1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - python-flatbuffers ==25.9.23

test:
  imports:
    - openmeteo_sdk
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/openmeteo-sdk/
  summary: Open-Meteo Python SDK
  doc_url: https://github.com/open-meteo/sdk/tree/main
  dev_url: https://github.com/open-meteo/sdk
  license: 'MIT'
  license_file: LICENSE

extra:
  recipe-maintainers:
    - akrherz
